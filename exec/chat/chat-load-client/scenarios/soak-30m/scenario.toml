[scenario]
name = "soak-30m"
description = "30분 장시간 안정성: 1000 클라이언트 1msg/sec 전송하며 메모리 누수/성능 저하 감지"
target_host = "127.0.0.1"
target_port = 8080

[clients]
count = 1000
nickname_prefix = "soak"

[phase_0]
type = "connect"
ramp_delay_ms = 10

[phase_1]
type = "join"

[phase_2]
type = "steady_send"
duration_sec = 1800
send_interval_ms = 1000
message_size_bytes = 64

[phase_3]
type = "disconnect"
